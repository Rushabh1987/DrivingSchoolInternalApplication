services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_ADMIN_USERNAME: ${NEXT_PUBLIC_ADMIN_USERNAME:-admin}
        NEXT_PUBLIC_ADMIN_PASSWORD: ${NEXT_PUBLIC_ADMIN_PASSWORD:-password}
    ports:
      - "8000:8000"
    environment:
      DRIVING_SCHOOL_DB_PATH: /app/backend/data/driving_school.db
    volumes:
      - ./backend/data:/app/backend/data
